<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Customs Portal — Login</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 2rem; width: min(400px, 92vw); }
    h1 { font-size: 1.25rem; margin: 0 0 1.5rem; }
    label { display: block; font-size: 0.875rem; margin-bottom: 0.35rem; color: #94a3b8; }
    input { width: 100%; padding: 0.65rem 0.75rem; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #f8fafc; margin-bottom: 1rem; }
    button { width: 100%; padding: 0.75rem; border: none; border-radius: 8px; background: #2563eb; color: white; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .hint { margin-top: 1rem; font-size: 0.75rem; color: #64748b; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/mock-customs/login">
    <h1>Customs Broker Portal</h1>
    <label for="customs-user">Username</label>
    <input id="customs-user" name="username" type="text" autocomplete="username" required />
    <label for="customs-pass">Password</label>
    <input id="customs-pass" name="password" type="password" autocomplete="current-password" required />
    <button id="login-submit" type="submit">Sign in</button>
    <p class="hint">Demo: broker.demo / clearborder2026</p>
  </form>
</body>
</html>
