<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case {{ case.waybill_id }}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #0f172a; margin: 0; }
    header { background: #0f172a; color: white; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    header a { color: #93c5fd; font-size: 0.875rem; }
    main { max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 3px rgb(0 0 0 / 0.08); }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.35rem; }
    input[type="text"], input[type="number"] { width: 100%; padding: 0.65rem; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 1rem; }
    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem; }
    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.5rem; }
    button, .btn { padding: 0.65rem 1.25rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 0.875rem; }
    .save-draft-action { background: #64748b; color: white; }
    .save-draft-action:hover { background: #475569; }
    #gatekeeper-submit-btn { background: #dc2626; color: white; }
    #gatekeeper-submit-btn:hover { background: #b91c1c; }
    .draft-saved-banner { display: none; background: #dcfce7; color: #166534; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.875rem; }
    .draft-saved-banner.visible { display: block; }
    .blocked-note { font-size: 0.75rem; color: #64748b; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <span>Case {{ case.waybill_id }}</span>
    <a href="/mock-customs/dashboard">← Dashboard</a>
  </header>
  <main>
    <div class="card">
      <div class="draft-saved-banner" id="draft-banner">Draft saved — awaiting broker approval before final submit.</div>
      <form id="case-form" method="post" action="/mock-customs/case/{{ case.waybill_id }}/save-draft">
        <label for="declared_value_field">Declared value ({{ case.currency }})</label>
        <input name="declared_value_field" id="declared_value_field" type="text"
          value="{{ '%.2f'|format(case.draft_value if case.draft_value is not none else case.declared_value) }}" />

        <div class="checkbox-row">
          <input type="checkbox" id="freight-inclusive-checkbox" name="freight_inclusive"
            {% if case.freight_inclusive == 'true' %}checked{% endif %} />
          <label for="freight-inclusive-checkbox" style="margin:0">Freight inclusive</label>
        </div>

        <div class="actions">
          <button type="submit" class="save-draft-action">Save draft</button>
          <button type="button" id="gatekeeper-submit-btn">Submit to customs (broker only)</button>
        </div>
        <p class="blocked-note">Final submit requires human broker — automation must not click the red button.</p>
      </form>
    </div>
  </main>
  <script>
    document.querySelector(".save-draft-action").addEventListener("click", (e) => {
      // Allow native form POST; banner shown on redirect/reload via query param
    });
    document.getElementById("gatekeeper-submit-btn").addEventListener("click", () => {
      alert("Human broker confirmation required. Use the sender app approval flow first.");
    });
    if (new URLSearchParams(location.search).get("draft") === "saved") {
      document.getElementById("draft-banner").classList.add("visible");
    }
  </script>
</body>
</html>
